name: Unit Tests & Reports

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write # Potrzebne do zapisu raportu na gałęzi gh-pages
  pages: write       # Potrzebne do hostowania strony
  id-token: write    # Potrzebne do uwierzytelnienia w GitHub Pages
  checks: write      # (Opcjonalnie) jeśli dodasz raporty w zakładce Checks
  pull-requests: write # Jeśli chcesz, aby bot dodawał komentarz w PR

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :mobile:testDebugUnitTest --continue

      - name: Prepare Reports for Deployment
        if: always()
        run: |
          # Tworzymy strukturę folderów: reports/<run_id>
          mkdir -p public/reports/${{ github.run_id }}
          # Kopiujemy wygenerowany raport HTML (upewnij się, że ścieżka jest poprawna)
          if [ -d "mobile/build/reports/tests/testDebugUnitTest" ]; then
            cp -r mobile/build/reports/tests/testDebugUnitTest/* public/reports/${{ github.run_id }}/
          fi
          # Tworzymy prosty index.html w katalogu głównym public (opcjonalne, ułatwia nawigację)
          echo "<html><body><h1>Test Reports History</h1><p>Latest: <a href='./reports/${{ github.run_id }}/index.html'>Run ${{ github.run_id }}</a></p></body></html>" > public/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true # WAŻNE: to zapobiega usuwaniu starych raportów

      - name: Add Link to Job Summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_id }}/index.html"
          echo "### ✅ Unit Test Report" >> $GITHUB_STEP_SUMMARY
          echo "Raport z testów jest dostępny tutaj: [Otwórz raport]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY